<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
    "opentype": "https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.module.js",

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { zipSync, strToU8 } from 'https://cdn.jsdelivr.net/npm/fflate@0.8.2/+esm';
import opentype from 'opentype';
import earcut from 'earcut';

// ============================================================================
// MÓDULO: GLYPH PARSING
// Convierte glyphs de opentype.js en polígonos 2D con holes detectados.
// Convención de salida:
//   - outer rings: CCW (área positiva en sistema con Y arriba)
//   - holes:       CW  (área negativa)
// opentype emite con Y abajo; invertimos a "Y matemática" (Y arriba) para que
// CCW = área positiva.
// ============================================================================

function signedArea(pts) {
  let a = 0;
  for (let i = 0, n = pts.length; i < n; i++) {
    const p = pts[i], q = pts[(i + 1) % n];
    a += (p.x * q.y - q.x * p.y);
  }
  return a / 2;
}

function pointInPolygon(p, poly) {
  let inside = false;
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    const xi = poly[i].x, yi = poly[i].y, xj = poly[j].x, yj = poly[j].y;
    const intersect = ((yi > p.y) !== (yj > p.y)) &&
      (p.x < (xj - xi) * (p.y - yi) / (yj - yi + 1e-12) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

function ensureOrientation(pts, wantCCW) {
  const a = signedArea(pts);
  if ((a > 0) !== wantCCW) return pts.slice().reverse();
  return pts;
}

/**
 * Sampled subpaths from a font path. Y already inverted (Y up = positive).
 */
function sampleFontPath(font, text, size, curveSegments = 14) {
  const path = font.getPath(text, 0, 0, size);
  const subpaths = [];
  let current = null;

  for (const cmd of path.commands) {
    if (cmd.type === 'M') {
      if (current && current.length) subpaths.push(current);
      current = [];
      current.push({ x: cmd.x, y: -cmd.y });
    } else if (cmd.type === 'L') {
      current.push({ x: cmd.x, y: -cmd.y });
    } else if (cmd.type === 'Q') {
      const p0 = current[current.length - 1];
      for (let i = 1; i <= curveSegments; i++) {
        const t = i / curveSegments;
        const u = 1 - t;
        const x = u*u*p0.x + 2*u*t*cmd.x1 + t*t*cmd.x;
        const y = u*u*p0.y + 2*u*t*(-cmd.y1) + t*t*(-cmd.y);
        current.push({ x, y });
      }
    } else if (cmd.type === 'C') {
      const p0 = current[current.length - 1];
      for (let i = 1; i <= curveSegments; i++) {
        const t = i / curveSegments;
        const u = 1 - t;
        const x = u*u*u*p0.x + 3*u*u*t*cmd.x1 + 3*u*t*t*cmd.x2 + t*t*t*cmd.x;
        const y = u*u*u*p0.y + 3*u*u*t*(-cmd.y1) + 3*u*t*t*(-cmd.y2) + t*t*t*(-cmd.y);
        current.push({ x, y });
      }
    }
    // 'Z': cerrado implícito; el último punto suele coincidir con el primero.
  }
  if (current && current.length) subpaths.push(current);

  // Sanitización: vértices consecutivos casi-coincidentes producen segmentos
  // de longitud cero que rompen la triangulación.
  const tol = 0.5;
  return subpaths.map(sub => {
    const dedupe = [];
    for (let i = 0; i < sub.length; i++) {
      const p = sub[i];
      const prev = dedupe[dedupe.length - 1];
      if (!prev || Math.hypot(p.x - prev.x, p.y - prev.y) > tol) dedupe.push(p);
    }
    if (dedupe.length > 1) {
      const first = dedupe[0];
      const last = dedupe[dedupe.length - 1];
      if (Math.hypot(first.x - last.x, first.y - last.y) <= tol) dedupe.pop();
    }
    return dedupe;
  }).filter(sub => sub.length >= 3);
}

/**
 * Agrupa subpaths en {outer, holes} usando containment + orientación.
 * Ordena por |área| descendente para asociar cada hole al outer más pequeño
 * que lo contiene.
 */
function groupShapes(subpaths) {
  const shapes = [];
  const used = new Array(subpaths.length).fill(false);

  const indexed = subpaths.map((p, i) => ({ p, i, area: Math.abs(signedArea(p)) }))
    .sort((a, b) => b.area - a.area);

  for (const { p: outer, i } of indexed) {
    if (used[i]) continue;
    const outerCCW = ensureOrientation(outer, true);
    const shape = { outer: outerCCW, holes: [] };

    for (const { p: cand, i: j } of indexed) {
      if (i === j || used[j]) continue;
      const testPt = cand[Math.floor(cand.length / 2)];
      if (pointInPolygon(testPt, outerCCW)) {
        shape.holes.push(ensureOrientation(cand, false));
        used[j] = true;
      }
    }
    used[i] = true;
    shapes.push(shape);
  }
  return shapes;
}

// ============================================================================
// MÓDULO: BISECTOR OFFSETTING (fase 2)
// Offset 2D por bisectriz interior. Preserva el nº de vértices y la
// correspondencia 1:1 entre original y desplazado, lo que permite stitching
// directo entre niveles del bevel sin resamplear.
//
// Convención:
//   delta < 0 = inset hacia el interior del polígono.
//   isCCW=true para outer, isCCW=false para holes (CW).
//   En offsetShapeByBisector pasamos -delta a los holes para que un delta < 0
//   contraiga el outer Y ensanche los holes (la franja de material se afina
//   uniformemente por todos los bordes — comportamiento natural del ribete).
//
// Capa de seguridad mínima (fase 2): miterLimit. En esquinas afiladas donde
// la bisectriz se vuelve muy larga, dejamos el vértice en su sitio. No se
// añaden las capas de "clamp por intersección" ni "segunda pasada iterativa"
// del v1 — si rompen letras concretas, se añadirán cuando aparezca el caso.
// ============================================================================

function offsetRingByBisector(ring, delta, isCCW, miterLimit = 4) {
  const n = ring.length;
  const result = new Array(n);
  const eff = -delta;

  // Normales unitarias interiores
  const normals = new Array(n);
  for (let i = 0; i < n; i++) {
    const a = ring[i], b = ring[(i + 1) % n];
    const dx = b.x - a.x, dy = b.y - a.y;
    const len = Math.hypot(dx, dy);
    if (len < 1e-9) { normals[i] = { x: 0, y: 0 }; continue; }
    if (isCCW) normals[i] = { x: -dy / len, y: dx / len };
    else       normals[i] = { x: dy / len, y: -dx / len };
  }

  for (let i = 0; i < n; i++) {
    const np = normals[(i - 1 + n) % n];
    const nn = normals[i];
    if ((np.x === 0 && np.y === 0) && (nn.x === 0 && nn.y === 0)) {
      result[i] = { x: ring[i].x, y: ring[i].y };
      continue;
    }
    const sumX = np.x + nn.x;
    const sumY = np.y + nn.y;
    const dot = np.x * nn.x + np.y * nn.y;
    const denom = 1 + dot;
    let bx, by;
    if (Math.abs(denom) < 1e-6) { bx = sumX / 2; by = sumY / 2; }
    else { bx = sumX / denom; by = sumY / denom; }

    if (Math.hypot(bx, by) > miterLimit) {
      result[i] = { x: ring[i].x, y: ring[i].y };
      continue;
    }
    result[i] = { x: ring[i].x + bx * eff, y: ring[i].y + by * eff };
  }
  return result;
}

function offsetShapeByBisector(shape, delta, miterLimit = 4) {
  return {
    outer: offsetRingByBisector(shape.outer, delta, true, miterLimit),
    holes: shape.holes.map(h => offsetRingByBisector(h, -delta, false, miterLimit)),
  };
}

// ============================================================================
// MÓDULO: GEOMETRY BUILDER
// Placa watertight con bisel opcional en el borde superior:
//   Z=0:                  base plana             (material 0 = Base)
//   Z=0  → wallTop:       paredes verticales     (material 1 = Borde)
//   Z=wallTop → Z=depth:  chaflán (si hay bevel) (material 1 = Borde)
//   Z=depth:              cima (contraída si hay bevel)  (material 0 = Base)
// con wallTop = depth - bevelDepth (o = depth si bevelDepth = 0).
// ============================================================================

/**
 * Triangula un shape (outer CCW + holes CW) con earcut. Devuelve flat verts y tris.
 */
function triangulateShape(outer, holes) {
  const flat = [];
  for (const p of outer) flat.push(p.x, p.y);
  const holeIdx = [];
  let cursor = outer.length;
  for (const hole of holes) {
    holeIdx.push(cursor);
    for (const p of hole) flat.push(p.x, p.y);
    cursor += hole.length;
  }
  const tris = earcut(flat, holeIdx.length ? holeIdx : null, 2);
  return { flat, tris };
}

/**
 * Construye la geometría con bevel opcional en la cima.
 *
 * Si bevelSize y bevelDepth son ambos > 0, las paredes verticales suben hasta
 * (depth - bevelDepth) y luego un chaflán de N segmentos lleva la silueta hasta
 * la versión contraída en Z=depth. Si no, la pared sube recta hasta la cima.
 *
 * Orientación de normales:
 *   - Base en Z=0:        tris invertidos → -Z
 *   - Paredes verticales: outer CCW → normal radial fuera; holes CW → normal hacia el aire del hole
 *   - Chaflán:            misma topología que la pared, vértices superiores desplazados radialmente
 *                          → la normal queda apuntando hacia fuera y arriba (correcta)
 *   - Cima en Z=depth:    tris originales → +Z
 *
 * Materiales:
 *   - 0 (Base):   base inferior + cima superior
 *   - 1 (Borde):  paredes verticales + chaflán
 */
function buildExtrudedGeometry({ shapes, depth, bevelSize = 0, bevelDepth = 0, bevelSegments = 1 }) {
  const positions = [];
  const indices = [];
  const groups = [];
  let curStart = 0;

  function emitFace(outer, holes, z, flipped) {
    const { flat, tris } = triangulateShape(outer, holes);
    const baseV = positions.length / 3;
    for (let i = 0; i < flat.length; i += 2) {
      positions.push(flat[i], flat[i + 1], z);
    }
    if (flipped) {
      for (let i = 0; i < tris.length; i += 3) {
        indices.push(tris[i] + baseV, tris[i + 2] + baseV, tris[i + 1] + baseV);
      }
    } else {
      for (let i = 0; i < tris.length; i++) indices.push(tris[i] + baseV);
    }
  }

  // Pared entre dos copias del MISMO ring (vertical o inclinada según los Z).
  // ringA en zA (abajo), ringB en zB (arriba). Para outer CCW con orientación
  // estándar la normal queda radial hacia afuera; para holes CW, radial hacia
  // el aire del hole. En ambos casos es lo que queremos sin invertir.
  function stitchRing(ringA, zA, ringB, zB) {
    const baseV = positions.length / 3;
    const n = ringA.length;
    if (n !== ringB.length) {
      console.warn('stitchRing: longitudes distintas', n, ringB.length);
      return;
    }
    for (let i = 0; i < n; i++) positions.push(ringA[i].x, ringA[i].y, zA);
    for (let i = 0; i < n; i++) positions.push(ringB[i].x, ringB[i].y, zB);
    for (let i = 0; i < n; i++) {
      const i0 = baseV + i;
      const i1 = baseV + (i + 1) % n;
      const j0 = baseV + n + i;
      const j1 = baseV + n + (i + 1) % n;
      indices.push(i0, i1, j0);
      indices.push(i1, j1, j0);
    }
  }

  const hasBevel = bevelSize > 1e-6 && bevelDepth > 1e-6;
  // Reservamos al menos 0.1 mm de pared vertical para que la cima quede a Z=depth
  // y el bevel no consuma toda la profundidad.
  const wallTop = hasBevel ? Math.max(0.1, depth - bevelDepth) : depth;
  const N = Math.max(1, bevelSegments | 0);

  for (const shape of shapes) {
    // ── Base en Z=0 (material 0) ──
    emitFace(shape.outer, shape.holes, 0, true);
    let end = indices.length;
    groups.push({ start: curStart, count: end - curStart, materialIndex: 0 });
    curStart = end;

    // ── Paredes verticales (material 1) ──
    stitchRing(shape.outer, 0, shape.outer, wallTop);
    for (const hole of shape.holes) stitchRing(hole, 0, hole, wallTop);
    end = indices.length;
    groups.push({ start: curStart, count: end - curStart, materialIndex: 1 });
    curStart = end;

    if (hasBevel) {
      // Niveles del chaflán: levels[0] = silueta original, levels[N] = cima contraída.
      const levels = [];
      for (let k = 0; k <= N; k++) {
        if (k === 0) {
          levels.push({ outer: shape.outer, holes: shape.holes });
        } else {
          const t = k / N;
          levels.push(offsetShapeByBisector(shape, -bevelSize * t));
        }
      }

      for (let k = 0; k < N; k++) {
        const zA = wallTop + bevelDepth * (k / N);
        const zB = wallTop + bevelDepth * ((k + 1) / N);
        stitchRing(levels[k].outer, zA, levels[k + 1].outer, zB);
        for (let h = 0; h < shape.holes.length; h++) {
          stitchRing(levels[k].holes[h], zA, levels[k + 1].holes[h], zB);
        }
      }
      end = indices.length;
      groups.push({ start: curStart, count: end - curStart, materialIndex: 1 });
      curStart = end;

      // Cima contraída
      emitFace(levels[N].outer, levels[N].holes, depth, false);
    } else {
      // Cima recta
      emitFace(shape.outer, shape.holes, depth, false);
    }
    end = indices.length;
    groups.push({ start: curStart, count: end - curStart, materialIndex: 0 });
    curStart = end;
  }

  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geom.setIndex(indices);

  // Compactar grupos consecutivos del mismo material
  const compacted = [];
  for (const g of groups) {
    if (g.count === 0) continue;
    const last = compacted[compacted.length - 1];
    if (last && last.materialIndex === g.materialIndex && last.start + last.count === g.start) {
      last.count += g.count;
    } else {
      compacted.push({ ...g });
    }
  }
  for (const g of compacted) geom.addGroup(g.start, g.count, g.materialIndex);

  geom.computeVertexNormals();
  geom.computeBoundingBox();
  return geom;
}

// ============================================================================
// MÓDULO: TESTS
// ============================================================================

const tests = [];
function test(name, fn) { tests.push({ name, fn }); }

function assert(cond, msg = 'assertion failed') {
  if (!cond) throw new Error(msg);
}
function assertNear(a, b, tol = 1e-6) {
  if (Math.abs(a - b) > tol) throw new Error(`expected ${b}±${tol}, got ${a}`);
}

test('signedArea cuadrado CCW positivo', () => {
  const sq = [{x:0,y:0},{x:10,y:0},{x:10,y:10},{x:0,y:10}];
  assert(signedArea(sq) > 0);
});

test('signedArea cuadrado CW negativo', () => {
  const sq = [{x:0,y:0},{x:0,y:10},{x:10,y:10},{x:10,y:0}];
  assert(signedArea(sq) < 0);
});

test('pointInPolygon: centro dentro, esquina externa fuera', () => {
  const sq = [{x:0,y:0},{x:10,y:0},{x:10,y:10},{x:0,y:10}];
  assert(pointInPolygon({x:5,y:5}, sq));

function setStatus(msg, kind = '') {

  el.className = kind;

function setStats(geom) {
  const v = geom.attributes.position.count;
  const t = geom.index.count / 3;
  const { w, h } = getWrapSize();
  document.getElementById('stats').textContent = `${v} vértices · ${t} tris · canvas ${w}×${h}`;
}

function rebuild() {
  if (!state.font) return;

  try {
    const subpaths = sampleFontPath(state.font, state.text || ' ', 72, 14);
    if (!subpaths.length) {
      setStatus('Texto vacío o glifos no soportados', 'warn');
      return;
    }
    const shapes = groupShapes(subpaths);
    const geom = buildExtrudedGeometry({
      shapes,
      depth: state.depth,
      bevelSize: state.bevelSize,
      bevelDepth: Math.min(state.bevelDepth, state.depth - 0.1),
      bevelSegments: state.bevelSeg,
    });

    const bb = geom.boundingBox;
    geom.translate(-(bb.max.x + bb.min.x) / 2, -(bb.max.y + bb.min.y) / 2, -(bb.max.z + bb.min.z) / 2);

    if (mesh) {
      scene.remove(mesh);
      mesh.geometry.dispose();
      mesh.material.forEach(m => m.dispose());
    }
    mesh = new THREE.Mesh(geom, buildMaterials());
    scene.add(mesh);

    setStats(geom);

  } catch (e) {

    setStatus(`Error: ${e.message}`, 'err');
  }
}

let EMBEDDED_FONT_B64 = ''; // se asigna al final del módulo (línea inyectada)

function base64ToArrayBuffer(b64) {
  const bin = atob(b64);
  const len = bin.length;
  const bytes = new Uint8Array(len);
  for (let i = 0; i < len; i++) bytes[i] = bin.charCodeAt(i);
  return bytes.buffer;
}

async function decodeWoff2(buf) {
  try {
    const mod = await import('https://cdn.jsdelivr.net/npm/woff2-encoder@2.0.0/+esm');
    const result = await mod.decompress(new Uint8Array(buf));
    return result.buffer.slice(result.byteOffset, result.byteOffset + result.byteLength);
  } catch (e) {
    throw new Error('WOFF2 no soportado en este entorno. Sube un TTF/OTF directamente.');
  }
}

async function loadFontBuffer(buf) {
  const view = new DataView(buf);
  const tag = view.getUint32(0, false);
  if (tag === 0x774F4632) { // 'wOF2'
    setStatus('Decodificando WOFF2...');
    const ttfBuf = await decodeWoff2(buf);
    return opentype.parse(ttfBuf);
  }
  return opentype.parse(buf);
}

async function loadGoogleFont(family) {
  setStatus(`Cargando ${family}...`);
  const cssUrl = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(family)}:wght@400&display=swap`;
  let cssText;
  try {
    cssText = await fetch(cssUrl).then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.text();
    });
  } catch (e) {
    throw new Error(`No se pudo contactar Google Fonts (${e.message}).`);
  }
  const ttfMatch = cssText.match(/url\((https:\/\/fonts\.gstatic\.com\/[^)]+\.ttf)\)/i);
  const woff2Match = cssText.match(/url\((https:\/\/fonts\.gstatic\.com\/[^)]+\.woff2)\)/i);
  const fontUrl = ttfMatch ? ttfMatch[1] : (woff2Match ? woff2Match[1] : null);
  if (!fontUrl) throw new Error(`No se encontró URL de fuente para ${family}`);

  const buf = await fetch(fontUrl).then(r => {
    if (!r.ok) throw new Error(`HTTP ${r.status} al descargar TTF`);
    return r.arrayBuffer();
  });
  if (!buf || buf.byteLength < 100) throw new Error(`Buffer de fuente inválido`);

  state.font = await loadFontBuffer(buf);
  setStatus(`Cargada: ${family}`, 'ok');
  rebuild();
}

async function loadUploadedFont(file) {
  setStatus(`Parseando ${file.name}...`);
  const buf = await file.arrayBuffer();
  state.font = await loadFontBuffer(buf);
  setStatus(`Cargada: ${file.name}`, 'ok');
  rebuild();
}

function loadEmbeddedFont() {
  try {
    const buf = base64ToArrayBuffer(EMBEDDED_FONT_B64);
    state.font = opentype.parse(buf);
    setStatus('Fuente local cargada (Bebas Neue)', 'ok');
    rebuild();
    return true;
  } catch (e) {
    setStatus(`Error fuente embebida: ${e.message}`, 'err');
    return false;
  }
}

function escapeXml(s) {
  return String(s).replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&apos;'})[c]);
}

function download(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
}

/**
 * 3MF (ZIP con XMLs) con materiales por triángulo vía Materials Extension.
 * Bambu Studio lee p1=N como índice en <basematerials> y permite asignar
 * filamentos por material desde el AMS.
 */
function build3MF(mesh, modelName, colorFace, colorBevel) {
  const geom = mesh.geometry;
  const positions = geom.getAttribute('position');
  const indexAttr = geom.getIndex();
  const groups = geom.groups;
  if (!indexAttr || groups.length === 0) throw new Error('Geometría sin grupos o sin índice');

  mesh.updateMatrixWorld(true);
  const matrix = mesh.matrixWorld;
  const tmpVec = new THREE.Vector3();

  const allVerts = [];
  const allTris = [];
  const vertexCache = new Map();

  for (const group of groups) {
    const start = group.start;
    const count = group.count;
    const pindex = group.materialIndex;
    for (let i = 0; i < count; i += 3) {
      const tri = [];
      for (let j = 0; j < 3; j++) {
        const origIdx = indexAttr.getX(start + i + j);
        let newIdx = vertexCache.get(origIdx);
        if (newIdx === undefined) {
          newIdx = allVerts.length / 3;
          tmpVec.fromBufferAttribute(positions, origIdx);
          tmpVec.applyMatrix4(matrix);
          allVerts.push(tmpVec.x, tmpVec.y, tmpVec.z);
          vertexCache.set(origIdx, newIdx);
        }
        tri.push(newIdx);
      }
      if (tri[0] !== tri[1] && tri[1] !== tri[2] && tri[0] !== tri[2]) {
        allTris.push({ v: tri, pindex });
      }
    }
  }

  if (allTris.length < 4) throw new Error('Geometría con menos de 4 triángulos válidos');

  // Validación manifold (warning informativo)
  const edges = new Map();
  for (const t of allTris) {
    const v = t.v;
    for (let i = 0; i < 3; i++) {
      const a = v[i], b = v[(i + 1) % 3];
      const key = a < b ? `${a}_${b}` : `${b}_${a}`;
      edges.set(key, (edges.get(key) || 0) + 1);
    }
  }
  let openEdges = 0;
  for (const [, c] of edges) if (c !== 2) openEdges++;
  if (openEdges > 0) console.warn(`3MF: ${openEdges} aristas no-manifold.`);
  else console.log('3MF: malla manifold ✓');

  const colHex = c => c.replace('#', '').toUpperCase();
  const baseMatColors = [colHex(colorFace), colHex(colorBevel)];
  const baseMatNames = ['Base', 'Borde'];

  let modelXml = `<?xml version="1.0" encoding="UTF-8"?>
<model unit="millimeter" xml:lang="en-US"`
    + ` xmlns="http://schemas.microsoft.com/3dmanufacturing/core/2015/02"`
    + ` xmlns:m="http://schemas.microsoft.com/3dmanufacturing/material/2015/02">
 <metadata name="Title">${escapeXml(modelName)}</metadata>
 <metadata name="Application">Beveled Text 3D — Fase 2</metadata>
 <resources>
  <basematerials id="100">
`;
  for (let i = 0; i < baseMatColors.length; i++) {
    modelXml += `   <base name="${baseMatNames[i]}" displaycolor="#${baseMatColors[i]}" />\n`;
  }
  modelXml += `  </basematerials>
  <object id="1" type="model" name="${escapeXml(modelName)}" pid="100" pindex="0">
   <mesh>
    <vertices>
`;
  for (let k = 0; k < allVerts.length; k += 3) {
    const x = parseFloat(allVerts[k].toFixed(4));
    const y = parseFloat(allVerts[k + 1].toFixed(4));
    const z = parseFloat(allVerts[k + 2].toFixed(4));
    modelXml += `     <vertex x="${x}" y="${y}" z="${z}" />\n`;
  }
  modelXml += `    </vertices>
    <triangles>
`;
  for (const t of allTris) {
    modelXml += `     <triangle v1="${t.v[0]}" v2="${t.v[1]}" v3="${t.v[2]}" p1="${t.pindex}" />\n`;
  }
  modelXml += `    </triangles>
   </mesh>
  </object>
 </resources>
 <build>
  <item objectid="1" />
 </build>
</model>
`;

  const contentTypesXml = `<?xml version="1.0" encoding="UTF-8"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
 <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml" />
 <Default Extension="model" ContentType="application/vnd.ms-package.3dmanufacturing-3dmodel+xml" />
</Types>
`;
  const relsXml = `<?xml version="1.0" encoding="UTF-8"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
 <Relationship Id="rel-1" Target="/3D/3dmodel.model" Type="http://schemas.microsoft.com/3dmanufacturing/2013/01/3dmodel" />
</Relationships>
`;

  const files = {
    '[Content_Types].xml': strToU8(contentTypesXml),
    '_rels/.rels': strToU8(relsXml),
    '3D/3dmodel.model': strToU8(modelXml),
  };
  const zipped = zipSync(files);
  return new Blob([zipped], { type: 'model/3mf' });
}

/**
 * STL binario. Pierde el agrupamiento por material (formato monocromo) pero
 * sirve como fallback universal.
 */
function buildSTL(mesh) {
  const geom = mesh.geometry;
  const positions = geom.getAttribute('position');
  const indexAttr = geom.getIndex();
  if (!indexAttr) throw new Error('Geometría sin índice');

  mesh.updateMatrixWorld(true);
  const matrix = mesh.matrixWorld;
  const tmp = new THREE.Vector3();

  const triCount = indexAttr.count / 3;
  const buffer = new ArrayBuffer(84 + triCount * 50);
  const view = new DataView(buffer);
  // Header de 80 bytes (vacío) + uint32 triCount
  view.setUint32(80, triCount, true);
  let offset = 84;

  const a = new THREE.Vector3(), b = new THREE.Vector3(), c = new THREE.Vector3();
  const ab = new THREE.Vector3(), ac = new THREE.Vector3(), n = new THREE.Vector3();

  for (let i = 0; i < triCount; i++) {
    const i0 = indexAttr.getX(i * 3);
    const i1 = indexAttr.getX(i * 3 + 1);
    const i2 = indexAttr.getX(i * 3 + 2);
    a.fromBufferAttribute(positions, i0).applyMatrix4(matrix);
    b.fromBufferAttribute(positions, i1).applyMatrix4(matrix);
    c.fromBufferAttribute(positions, i2).applyMatrix4(matrix);
    ab.subVectors(b, a); ac.subVectors(c, a);
    n.crossVectors(ab, ac).normalize();

    view.setFloat32(offset, n.x, true); view.setFloat32(offset + 4, n.y, true); view.setFloat32(offset + 8, n.z, true);
    view.setFloat32(offset + 12, a.x, true); view.setFloat32(offset + 16, a.y, true); view.setFloat32(offset + 20, a.z, true);
    view.setFloat32(offset + 24, b.x, true); view.setFloat32(offset + 28, b.y, true); view.setFloat32(offset + 32, b.z, true);
    view.setFloat32(offset + 36, c.x, true); view.setFloat32(offset + 40, c.y, true); view.setFloat32(offset + 44, c.z, true);
    view.setUint16(offset + 48, 0, true);
    offset += 50;
  }
  return new Blob([buffer], { type: 'model/stl' });
}

document.getElementById('export-3mf').addEventListener('click', () => {
