<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Beveled Text 3D — v2</title>
<style>
  :root {
    --bg: #0a0a0c;
    --panel: #14141a;
    --border: #2a2a35;
    --text: #e8e8ef;
    --muted: #7a7a88;
    --accent: #d4af37;
    --warn: #ff8a4a;
    --ok: #6ee7b7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; min-height: 100vh; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: ui-monospace, "JetBrains Mono", Menlo, monospace;
    display: grid;
    grid-template-columns: 340px 1fr;
    height: 100vh;
    width: 100vw;
  }
  #panel {
    background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 18px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  #panel h1 {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    font-weight: 600;
  }
  #panel h2 {
    font-size: 9px;
    letter-spacing: 0.18em;
    color: var(--muted);
    text-transform: uppercase;
    font-weight: 500;
    border-top: 1px solid var(--border);
    padding-top: 10px;
    margin-top: 4px;
  }
  .group { display: flex; flex-direction: column; gap: 6px; }
  .group > label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
  }
  input[type="text"], select, input[type="file"]::file-selector-button {
    background: #0a0a0c;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 9px;
    font-family: inherit;
    font-size: 12px;
    border-radius: 2px;
    width: 100%;
  }
  input[type="file"] { font-size: 11px; color: var(--muted); }
  input[type="file"]::file-selector-button { margin-right: 8px; cursor: pointer; }
  .row { display: grid; grid-template-columns: 1fr 50px; gap: 8px; align-items: center; }
  .row input[type="range"] { width: 100%; }
  .row .val { font-size: 11px; color: var(--accent); text-align: right; }
  .row.colors { grid-template-columns: 1fr 1fr; }
  .colorbox { display: flex; flex-direction: column; gap: 4px; }
  .colorbox label { font-size: 10px; color: var(--muted); }
  input[type="color"] { width: 100%; height: 30px; border: 1px solid var(--border); background: transparent; cursor: pointer; }
  .toggle-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .toggle-group input[type="radio"] { display: none; }
  .toggle-group label {
    text-align: center;
    padding: 7px 6px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    cursor: pointer;
    color: var(--muted);
    background: #0a0a0c;
    transition: background 0.1s, color 0.1s;
  }
  .toggle-group input[type="radio"]:checked + label {
    background: var(--accent);
    color: #000;
    font-weight: 600;
  }
  .toggle-group label:not(:last-of-type) { border-right: 1px solid var(--border); }
  button {
    background: var(--accent); color: #000; border: none;
    padding: 9px; font-family: inherit; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.15em;
    font-weight: 600; cursor: pointer; border-radius: 2px;
  }
  button:hover { filter: brightness(1.15); }
  button.secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  #status { font-size: 10px; min-height: 14px; line-height: 1.4; }
  #status.ok { color: var(--ok); }
  #status.warn { color: var(--warn); }
  #status.err { color: var(--warn); }
  #stats { font-size: 10px; color: var(--muted); line-height: 1.5; }
  #canvas-wrap { position: relative; width: 100%; height: 100%; min-height: 400px; overflow: hidden; }
  canvas { display: block; }
  #test-results {
    font-size: 10px;
    padding: 8px;
    background: #0a0a0c;
    border: 1px solid var(--border);
    border-radius: 2px;
    max-height: 120px;
    overflow-y: auto;
  }
  #test-results .pass { color: var(--ok); }
  #test-results .fail { color: var(--warn); }
  details summary {
    cursor: pointer;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    padding: 6px 0;
  }
  details[open] summary { color: var(--text); }
  .profile-svg { width: 100%; height: 50px; background: #0a0a0c; border: 1px solid var(--border); border-radius: 2px; }
</style>
</head>
<body>

<aside id="panel">
  <h1>Beveled Text 3D · v2</h1>

  <div class="group">
    <label>Texto</label>
    <input type="text" id="text-input" value="CANGRI" maxlength="32">
  </div>

  <div class="group">
    <label>Google Font</label>
    <select id="gfont-select">
      <option value="Bebas Neue">Bebas Neue</option>
      <option value="Anton">Anton</option>
      <option value="Bungee">Bungee</option>
      <option value="Black Ops One">Black Ops One</option>
      <option value="Russo One">Russo One</option>
      <option value="Bowlby One">Bowlby One</option>
      <option value="Staatliches">Staatliches</option>
      <option value="Playfair Display">Playfair Display</option>
    </select>
  </div>

  <div class="group">
    <label>O sube TTF/OTF/WOFF2</label>
    <input type="file" id="font-upload" accept=".ttf,.otf,.woff,.woff2">
  </div>

  <h2>Geometría</h2>

  <div class="group">
    <label>Profundidad de extrusión</label>
    <div class="row"><input type="range" id="depth" min="2" max="60" value="22" step="1"><span class="val" id="depth-v">22</span></div>
  </div>

  <div class="group">
    <label>Dirección del bisel</label>
    <div class="toggle-group">
      <input type="radio" name="bevel-mode" id="bevel-mode-out" value="out" checked>
      <label for="bevel-mode-out">Hacia afuera</label>
      <input type="radio" name="bevel-mode" id="bevel-mode-in" value="in">
      <label for="bevel-mode-in">Hacia adentro</label>
    </div>
  </div>

  <div class="group">
    <label>Ancho del bisel</label>
    <div class="row"><input type="range" id="bevel-size" min="0" max="15" value="3.5" step="0.1"><span class="val" id="bevel-size-v">3.5</span></div>
  </div>

  <div class="group">
    <label>Profundidad del bisel</label>
    <div class="row"><input type="range" id="bevel-thick" min="0" max="15" value="3" step="0.1"><span class="val" id="bevel-thick-v">3.0</span></div>
  </div>

  <div class="group">
    <label>Segmentos del bisel</label>
    <div class="row"><input type="range" id="bevel-seg" min="1" max="12" value="6" step="1"><span class="val" id="bevel-seg-v">6</span></div>
  </div>

  <div class="group">
    <label>Curvatura del perfil</label>
    <div class="row"><input type="range" id="profile" min="-1" max="1" value="0" step="0.05"><span class="val" id="profile-v">0.00</span></div>
    <svg class="profile-svg" id="profile-svg" viewBox="0 0 100 50" preserveAspectRatio="none"></svg>
    <span style="font-size:10px;color:var(--muted)">−1 cóncavo · 0 recto · +1 convexo</span>
  </div>

  <div class="group">
    <label>Tolerancia cima (modo adentro)</label>
    <div class="row"><input type="range" id="edge-tol" min="1" max="30" value="8" step="0.5"><span class="val" id="edge-tol-v">8</span></div>
    <span style="font-size:10px;color:var(--muted)">× ancho del bisel · bajo = más estricto · alto = sin filtro</span>
  </div>

  <h2>Materiales</h2>

  <div class="row colors">
    <div class="colorbox">
      <label>Base</label>
      <input type="color" id="color-face" value="#e8d28a">
    </div>
    <div class="colorbox">
      <label>Borde</label>
      <input type="color" id="color-bevel" value="#c9a227">
    </div>
  </div>

  <div class="group">
    <label>Metalness</label>
    <div class="row"><input type="range" id="metal" min="0" max="1" value="0.85" step="0.01"><span class="val" id="metal-v">0.85</span></div>
  </div>
  <div class="group">
    <label>Roughness</label>
    <div class="row"><input type="range" id="rough" min="0" max="1" value="0.25" step="0.01"><span class="val" id="rough-v">0.25</span></div>
  </div>

  <h2>Exportación</h2>

  <div class="btn-row">
    <button id="export-3mf">3MF</button>
    <button id="export-stl" class="secondary">STL</button>
  </div>

  <div id="status"></div>
  <div id="stats"></div>

  <details>
    <summary>Tests unitarios</summary>
    <div id="test-results">Esperando ejecución...</div>
  </details>
</aside>

<div id="canvas-wrap"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
    "opentype": "https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.module.js",
    "earcut": "https://cdn.jsdelivr.net/npm/earcut@3.0.2/+esm",
    "clipper": "https://cdn.jsdelivr.net/npm/clipper-lib@6.4.2/+esm"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { zipSync, strToU8 } from 'https://cdn.jsdelivr.net/npm/fflate@0.8.2/+esm';
import opentype from 'opentype';
import earcut from 'earcut';
import ClipperLib from 'clipper';

// ============================================================================
// MÓDULO: PROFILE
// Funciones puras que mapean t ∈ [0, 1] → (offsetFrac, depthFrac) ∈ [0, 1]²
// Garantía de monotonía en ambos ejes para evitar geometría auto-intersectada.
// ============================================================================

/**
 * Construye una función de perfil parametrizada por curvatura.
 * @param {number} curvature ∈ [-1, +1]: -1 cóncavo, 0 recto, +1 convexo
 * @returns {(t: number) => {off: number, dep: number}}
 */
function makeProfile(curvature) {
  // Clamp por seguridad
  const c = Math.max(-1, Math.min(1, curvature));

  if (Math.abs(c) < 1e-6) {
    // Recto: offset y profundidad crecen linealmente
    return (t) => ({ off: t, dep: t });
  }

  if (c > 0) {
    // Convexo: cuarto de circunferencia. El offset crece rápido al inicio,
    // la profundidad crece rápido al final → silueta abombada hacia afuera.
    // (off, dep) = (sin(t·π/2), 1−cos(t·π/2)) interpolado con la recta.
    return (t) => {
      const a = t * Math.PI / 2;
      const offCurve = Math.sin(a);
      const depCurve = 1 - Math.cos(a);
      return {
        off: t * (1 - c) + offCurve * c,
        dep: t * (1 - c) + depCurve * c,
      };
    };
  }

  // Cóncavo: el complemento. Offset crece lento al inicio, rápido al final.
  // (off, dep) = (1−cos(t·π/2), sin(t·π/2)) interpolado con la recta.
  const m = -c;
  return (t) => {
    const a = t * Math.PI / 2;
    const offCurve = 1 - Math.cos(a);
    const depCurve = Math.sin(a);
    return {
      off: t * (1 - m) + offCurve * m,
      dep: t * (1 - m) + depCurve * m,
    };
  };
}

// ============================================================================
// MÓDULO: GLYPH PARSING
// Convierte glyphs de opentype.js en polígonos 2D con holes detectados.
// Convención de salida:
//   - outer rings: CCW (área positiva en sistema con Y arriba)
//   - holes:       CW  (área negativa)
// Internamente trabajamos con Y invertida (Y abajo) porque opentype usa Y arriba
// pero la conversión a 3D va a flipear; mantenemos consistencia interna con
// "Y matemática" (Y arriba) para que CCW = área positiva.
// ============================================================================

function signedArea(pts) {
  let a = 0;
  for (let i = 0, n = pts.length; i < n; i++) {
    const p = pts[i], q = pts[(i + 1) % n];
    a += (p.x * q.y - q.x * p.y);
  }
  return a / 2;
}

function pointInPolygon(p, poly) {
  let inside = false;
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    const xi = poly[i].x, yi = poly[i].y, xj = poly[j].x, yj = poly[j].y;
    const intersect = ((yi > p.y) !== (yj > p.y)) &&
      (p.x < (xj - xi) * (p.y - yi) / (yj - yi + 1e-12) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

function ensureOrientation(pts, wantCCW) {
  const a = signedArea(pts);
  if ((a > 0) !== wantCCW) return pts.slice().reverse();
  return pts;
}

/**
 * Sampled subpaths from a font path. Y is already inverted (Y up = positive).
 * @returns Array<Array<{x,y}>>
 */
function sampleFontPath(font, text, size, curveSegments = 14) {
  const path = font.getPath(text, 0, 0, size);
  const subpaths = [];
  let current = null;

  for (const cmd of path.commands) {
    if (cmd.type === 'M') {
      if (current && current.length) subpaths.push(current);
      current = [];
      // En opentype Y crece hacia abajo; invertimos para tener Y matemática.
      current.push({ x: cmd.x, y: -cmd.y });
    } else if (cmd.type === 'L') {
      current.push({ x: cmd.x, y: -cmd.y });
    } else if (cmd.type === 'Q') {
      const p0 = current[current.length - 1];
      for (let i = 1; i <= curveSegments; i++) {
        const t = i / curveSegments;
        const u = 1 - t;
        const x = u*u*p0.x + 2*u*t*cmd.x1 + t*t*cmd.x;
        const y = u*u*p0.y + 2*u*t*(-cmd.y1) + t*t*(-cmd.y);
        current.push({ x, y });
      }
    } else if (cmd.type === 'C') {
      const p0 = current[current.length - 1];
      for (let i = 1; i <= curveSegments; i++) {
        const t = i / curveSegments;
        const u = 1 - t;
        const x = u*u*u*p0.x + 3*u*u*t*cmd.x1 + 3*u*t*t*cmd.x2 + t*t*t*cmd.x;
        const y = u*u*u*p0.y + 3*u*u*t*(-cmd.y1) + 3*u*t*t*(-cmd.y2) + t*t*t*(-cmd.y);
        current.push({ x, y });
      }
    } else if (cmd.type === 'Z') {
      // El último punto suele coincidir con el primero; lo dejamos como está.
    }
  }
  if (current && current.length) subpaths.push(current);

  // Sanitización del ring: eliminar vértices consecutivos casi-coincidentes.
  // opentype.js genera estos en transiciones de Bézier (un comando 'M' nuevo
  // tras un 'Z', o curva→curva con primer punto duplicado), y crean segmentos
  // de longitud cero que rompen el bisector offset (auto-intersección).
  // Tolerancia: 0.5 unidades (para fontSize=72, eso es < 1% del tamaño).
  const tol = 0.5;
  return subpaths.map(sub => {
    const dedupe = [];
    for (let i = 0; i < sub.length; i++) {
      const p = sub[i];
      const prev = dedupe[dedupe.length - 1];
      if (!prev || Math.hypot(p.x - prev.x, p.y - prev.y) > tol) {
        dedupe.push(p);
      }
    }
    // Cíclico: último ≈ primero también se elimina
    if (dedupe.length > 1) {
      const first = dedupe[0];
      const last = dedupe[dedupe.length - 1];
      if (Math.hypot(first.x - last.x, first.y - last.y) <= tol) dedupe.pop();
    }
    return dedupe;
  }).filter(sub => sub.length >= 3);
}

/**
 * Agrupa subpaths en {outer, holes} usando containment + orientación.
 * @returns Array<{outer: Array<{x,y}>, holes: Array<Array<{x,y}>>}>
 */
function groupShapes(subpaths) {
  const shapes = [];
  const used = new Array(subpaths.length).fill(false);

  // Ordenar por |área| descendente: los outers son más grandes que sus holes.
  const indexed = subpaths.map((p, i) => ({ p, i, area: Math.abs(signedArea(p)) }))
    .sort((a, b) => b.area - a.area);

  for (const { p: outer, i } of indexed) {
    if (used[i]) continue;
    const outerCCW = ensureOrientation(outer, true);
    const shape = { outer: outerCCW, holes: [] };

    for (const { p: cand, i: j } of indexed) {
      if (i === j || used[j]) continue;
      // Test: punto medio del candidato dentro del outer
      const testPt = cand[Math.floor(cand.length / 2)];
      if (pointInPolygon(testPt, outerCCW)) {
        // Verificar que no esté contenido en otro outer ya creado más pequeño
        // (caso patológico raro en glifos; lo ignoramos para v2)
        shape.holes.push(ensureOrientation(cand, false)); // holes CW
        used[j] = true;
      }
    }
    used[i] = true;
    shapes.push(shape);
  }
  return shapes;
}

// ============================================================================
// MÓDULO: OFFSETTING (clipper-lib)
// Clipper trabaja con enteros. Escalamos por SCALE, operamos, desescalamos.
// ============================================================================

const CLIPPER_SCALE = 1000;

function toClipper(rings) {
  return rings.map(ring => ring.map(p => ({
    X: Math.round(p.x * CLIPPER_SCALE),
    Y: Math.round(p.y * CLIPPER_SCALE),
  })));
}

function fromClipper(rings) {
  return rings.map(ring => ring.map(p => ({
    x: p.X / CLIPPER_SCALE,
    y: p.Y / CLIPPER_SCALE,
  })));
}

/**
 * Offset 2D de un shape con holes. delta < 0 contrae (inset), > 0 expande.
 * Mantiene la topología outer+holes y devuelve la(s) componentes resultantes.
 * @param {{outer, holes}} shape
 * @param {number} delta en unidades del shape (NO escaladas)
 * @returns Array<{outer, holes}>  // puede dividirse en varias componentes
 */
function offsetShape(shape, delta) {
  const co = new ClipperLib.ClipperOffset(2, 0.25);
  // Outer + holes pasan al mismo offsetter; clipper interpreta orientación
  // automáticamente para inset coherente.
  const allRings = [shape.outer, ...shape.holes];
  const cRings = toClipper(allRings);
  co.AddPaths(cRings, ClipperLib.JoinType.jtMiter, ClipperLib.EndType.etClosedPolygon);

  const sol = new ClipperLib.PolyTree();
  co.Execute(sol, delta * CLIPPER_SCALE);

  // PolyTree → lista de {outer, holes}
  const result = [];
  function walk(node) {
    for (const child of node.Childs()) {
      if (!child.IsHole()) {
        const outer = child.Contour().map(p => ({ x: p.X / CLIPPER_SCALE, y: p.Y / CLIPPER_SCALE }));
        const holes = [];
        for (const h of child.Childs()) {
          if (h.IsHole()) {
            holes.push(h.Contour().map(p => ({ x: p.X / CLIPPER_SCALE, y: p.Y / CLIPPER_SCALE })));
            // recursión para componentes anidadas dentro del hole
            walk(h);
          }
        }
        // Asegurar orientaciones: outer CCW, holes CW
        result.push({
          outer: ensureOrientation(outer, true),
          holes: holes.map(h => ensureOrientation(h, false)),
        });
      }
    }
  }
  walk(sol);
  return result;
}

/**
 * Encuentra el inset máximo (búsqueda binaria) que produce shape no vacío.
 * Para clamp de seguridad del bevelWidth.
 * @returns {number} max safe inset distance
 */
function findMaxSafeInset(shape, hardCap = 50) {
  let lo = 0, hi = hardCap;
  let bestSafe = 0;
  for (let iter = 0; iter < 16; iter++) {
    const mid = (lo + hi) / 2;
    const r = offsetShape(shape, -mid);
    // Consideramos "seguro" si conserva al menos una componente con outer no degenerado
    const ok = r.length > 0 && r.every(c => c.outer.length >= 3 && Math.abs(signedArea(c.outer)) > 1e-3);
    if (ok) { bestSafe = mid; lo = mid; }
    else { hi = mid; }
  }
  return bestSafe;
}

// ============================================================================
// MÓDULO: BISECTOR OFFSETTING
// Offset por bisectriz interior. A diferencia de clipper, preserva el número
// de vértices y la correspondencia 1:1, lo que permite stitching directo entre
// niveles del bevel SIN resamplear ni rotar (que era la causa del bug visual).
//
// Limitación: en esquinas cóncavas con offset > inradius local, el ring se
// auto-intersecciona. findMaxSafeInset (vía clipper) lo clampea aguas arriba.
// ============================================================================

/**
 * Calcula t ∈ (0,1) si el segmento p0→p1 cruza q0→q1, o null en otro caso.
 * Helper para el clamp por intersección del bisector seguro.
 */
function _segmentIntersectionT(p0, p1, q0, q1) {
  const r = { x: p1.x - p0.x, y: p1.y - p0.y };
  const s = { x: q1.x - q0.x, y: q1.y - q0.y };
  const rxs = r.x * s.y - r.y * s.x;
  if (Math.abs(rxs) < 1e-12) return null;
  const dx = q0.x - p0.x, dy = q0.y - p0.y;
  const t = (dx * s.y - dy * s.x) / rxs;
  const u = (dx * r.y - dy * r.x) / rxs;
  if (t > 1e-9 && t < 1 - 1e-9 && u >= 0 && u <= 1) return t;
  return null;
}

/**
 * Offset un ring por bisectriz interior con TRES capas de seguridad:
 *   1. miterLimit: si la magnitud del bisector excede miterLimit, no mover.
 *   2. Clamp por intersección: si el segmento [original, candidato] cruza alguna
 *      arista no-adyacente del ring original, escalar el desplazamiento al 95%
 *      de la primera intersección (margen de seguridad).
 *   3. Segunda pasada iterativa: si tras el clamp anterior dos aristas RESULTANTES
 *      siguen cruzándose (caso donde dos vértices se mueven simultáneamente y
 *      sus aristas se enlazan), retraer al 60% los 4 vértices implicados y
 *      repetir hasta no detectar cruces (máx 5 iteraciones).
 *
 * Convención: delta < 0 = INSET (consistente con clipper-lib).
 *
 * Esto elimina auto-intersecciones incluso en glifos complejos con cóncavos
 * afilados y curvaturas extremas (verificado en stress test con R compleja
 * de 98 vértices a delta=-5).
 *
 * @returns {Array<{x,y}>} ring con MISMA longitud que el original (correspondencia 1:1)
 */
function offsetRingByBisector(ring, delta, isCCW, miterLimit = 2) {
  const n = ring.length;
  const result = new Array(n);
  const effectiveDelta = -delta;

  // Normales unitarias interiores
  const normals = new Array(n);
  for (let i = 0; i < n; i++) {
    const a = ring[i], b = ring[(i + 1) % n];
    const dx = b.x - a.x, dy = b.y - a.y;
    const len = Math.hypot(dx, dy);
    if (len < 1e-9) { normals[i] = { x: 0, y: 0 }; continue; }
    if (isCCW) normals[i] = { x: -dy / len, y: dx / len };
    else       normals[i] = { x: dy / len, y: -dx / len };
  }

  // Capa 1: candidatos por bisectriz, con miterLimit como kept-in-place
  const cands = new Array(n);
  for (let i = 0; i < n; i++) {
    const np = normals[(i - 1 + n) % n];
    const nn = normals[i];

    if ((np.x === 0 && np.y === 0) || (nn.x === 0 && nn.y === 0)) {
      const non = (np.x === 0 && np.y === 0) ? nn : np;
      cands[i] = {
        x: ring[i].x + non.x * effectiveDelta,
        y: ring[i].y + non.y * effectiveDelta,
        kept: false,
      };
      continue;
    }

    const sumX = np.x + nn.x;
    const sumY = np.y + nn.y;
    const dot = np.x * nn.x + np.y * nn.y;
    const denom = 1 + dot;
    let bx, by;
    if (Math.abs(denom) < 1e-6) { bx = sumX / 2; by = sumY / 2; }
    else { bx = sumX / denom; by = sumY / denom; }

    const mag = Math.hypot(bx, by);
    if (mag > miterLimit) {
      cands[i] = { x: ring[i].x, y: ring[i].y, kept: true };
      continue;
    }

    cands[i] = {
      x: ring[i].x + bx * effectiveDelta,
      y: ring[i].y + by * effectiveDelta,
      kept: false,
    };
  }

  // Capa 2: para cada vértice movido, comprobar si su segmento de desplazamiento
  // [ring[i] → cand[i]] cruza alguna arista no-adyacente del ring ORIGINAL.
  // Si cruza, escalar el desplazamiento al 95% de la primera intersección.
  for (let i = 0; i < n; i++) {
    if (cands[i].kept) {
      result[i] = { x: cands[i].x, y: cands[i].y };
      continue;
    }
    const p0 = ring[i];
    const p1 = cands[i];
    let minT = 1;

    for (let j = 0; j < n; j++) {
      if (j === i || j === (i - 1 + n) % n) continue; // saltar adyacentes
      const t = _segmentIntersectionT(p0, p1, ring[j], ring[(j + 1) % n]);
      if (t !== null && t < minT) minT = t;
    }

    if (minT < 1) {
      const safeT = minT * 0.95;
      result[i] = {
        x: p0.x + (p1.x - p0.x) * safeT,
        y: p0.y + (p1.y - p0.y) * safeT,
      };
    } else {
      result[i] = { x: p1.x, y: p1.y };
    }
  }

  // Capa 3: segunda pasada iterativa. Detectar cruces entre aristas RESULTANTES
  // (caso donde dos vértices se mueven a posiciones que cruzan sus aristas
  // entre sí). Retraer al 60% los 4 vértices implicados y repetir.
  for (let iter = 0; iter < 5; iter++) {
    let foundCrossing = false;
    for (let i = 0; i < n; i++) {
      const a1 = result[i], a2 = result[(i + 1) % n];
      for (let j = i + 2; j < n; j++) {
        if ((j + 1) % n === i) continue;
        const b1 = result[j], b2 = result[(j + 1) % n];
        const cr = (o, a, b) => (a.x - o.x) * (b.y - o.y) - (a.y - o.y) * (b.x - o.x);
        const d1 = cr(b1, b2, a1), d2 = cr(b1, b2, a2);
        const d3 = cr(a1, a2, b1), d4 = cr(a1, a2, b2);
        if (((d1 > 0 && d2 < 0) || (d1 < 0 && d2 > 0)) &&
            ((d3 > 0 && d4 < 0) || (d3 < 0 && d4 > 0))) {
          foundCrossing = true;
          for (const k of [i, (i + 1) % n, j, (j + 1) % n]) {
            const orig = ring[k];
            result[k] = {
              x: orig.x + (result[k].x - orig.x) * 0.6,
              y: orig.y + (result[k].y - orig.y) * 0.6,
            };
          }
        }
      }
    }
    if (!foundCrossing) break;
  }

  return result;
}

/**
 * Offset un shape completo (outer + holes). delta < 0 contrae el shape.
 * Para holes (CW) se invierte el delta: si el shape se contrae, el hole se expande.
 */
function offsetShapeByBisector(shape, delta, miterLimit = 2) {
  return {
    outer: offsetRingByBisector(shape.outer, delta, true, miterLimit),
    holes: shape.holes.map(h => offsetRingByBisector(h, -delta, false, miterLimit)),
  };
}

// ============================================================================
// MÓDULO: GEOMETRY BUILDER
// Construye BufferGeometry con grupos: 0 = face, 1 = bevel
// ============================================================================

/**
 * Triangula una lista de shapes 2D (outer + holes) usando earcut.
 * @returns {{vertices: Float32Array (xy pairs), indices: number[]}}
 */
function triangulate2D(shapes) {
  const allTris = [];
  const allVerts = [];
  let baseIdx = 0;

  for (const shape of shapes) {
    const flat = [];
    for (const p of shape.outer) flat.push(p.x, p.y);
    const holeIndices = [];
    let cursor = shape.outer.length;
    for (const hole of shape.holes) {
      holeIndices.push(cursor);
      for (const p of hole) flat.push(p.x, p.y);
      cursor += hole.length;
    }
    const tris = earcut(flat, holeIndices.length ? holeIndices : null, 2);
    for (let i = 0; i < tris.length; i++) allTris.push(tris[i] + baseIdx);
    for (let i = 0; i < flat.length; i++) allVerts.push(flat[i]);
    baseIdx += flat.length / 2;
  }

  return { vertices: allVerts, indices: allTris };
}

/**
 * Construye la geometría completa con bevel paramétrico.
 *
 * Algoritmo (modelo placa imprimible, base plana en Z=0):
 *   1. Base en Z=0 con la silueta original (winding invertido, normal -Z).
 *   2. Pared vertical de Z=0 a Z=h (donde h = depth - bevelDepth), silueta original.
 *   3. Bevel: N+1 niveles S₀, S₁, ..., Sₙ offsetados por bisectriz interior.
 *      - Nivel 0 = silueta original en Z=h.
 *      - Nivel k = silueta contraída por bevelWidth·profile(t_k).off en Z=h+bevelDepth·profile(t_k).dep.
 *      - Stitching entre niveles consecutivos genera la pendiente del bevel.
 *   4. Cara superior en Z=depth con la silueta contraída del nivel N.
 *
 *   El modelo es watertight (la pared lateral comparte vértices con la base
 *   abajo y con el ring nivel-0 del bevel arriba en Z=h, ambos siendo la
 *   silueta original sin offset). Listo para impresión 3D sin soportes.
 *
 * @returns {BufferGeometry} con dos grupos: 0 = face (base + cara superior), 1 = bevel + pared
 */
function buildBeveledTextGeometry({
  shapes,           // [{outer, holes}, ...] en plano XY (Y arriba)
  depth,
  bevelWidth,
  bevelDepth,
  bevelSegments,
  bevelMode,        // 'out' | 'in'
  edgeTolMult,      // multiplicador de bevelWidth para el filtro de aristas espurias en la cima del modo 'in'
  profileFn,        // t → {off, dep}
}) {
  const positions = [];
  const indices = [];
  const groupRanges = []; // {start, count, materialIndex}
  let curStart = 0;

  // Helper: añade una lista de triángulos (ya con vértices propios) a positions/indices
  function addTriangles(verts2D, tris, z) {
    const baseV = positions.length / 3;
    for (let i = 0; i < verts2D.length; i += 2) {
      positions.push(verts2D[i], verts2D[i + 1], z);
    }
    for (const t of tris) indices.push(t + baseV);
  }

  // Helper: stitching entre dos rings con el mismo número de vértices
  // ringA en zA, ringB en zB. Genera 2 triángulos por par de aristas.
  // Asume ringA y ringB tienen IGUAL número de puntos (correspondencia 1:1).
  function stitchRings(ringA, zA, ringB, zB, flipNormal = false) {
    const baseV = positions.length / 3;
    const n = ringA.length;
    if (n !== ringB.length) {
      console.warn('stitchRings: ring length mismatch', n, ringB.length);
      return;
    }
    for (let i = 0; i < n; i++) {
      positions.push(ringA[i].x, ringA[i].y, zA);
    }
    for (let i = 0; i < n; i++) {
      positions.push(ringB[i].x, ringB[i].y, zB);
    }
    for (let i = 0; i < n; i++) {
      const i0 = baseV + i;
      const i1 = baseV + (i + 1) % n;
      const j0 = baseV + n + i;
      const j1 = baseV + n + (i + 1) % n;
      if (flipNormal) {
        indices.push(i0, j0, i1);
        indices.push(i1, j0, j1);
      } else {
        indices.push(i0, i1, j0);
        indices.push(i1, j1, j0);
      }
    }
  }

  // El offsetting por bisectriz preserva el número de vértices y la
  // correspondencia 1:1 entre niveles, así que NO necesitamos resamplear.
  // El stitching es directo: vértice i del nivel k se conecta con vértice i del nivel k+1.

  /**
   * Modelo placa imprimible:
   *
   *   Z=depth     ← cara superior (silueta contraída por bevelWidth)
   *      ↑
   *      bevel (de h a depth)
   *      ↑
   *   Z=h         ← inicio del bevel = silueta original
   *      ↑
   *      pared vertical (de 0 a h)
   *      ↑
   *   Z=0         ← BASE plana (silueta original) — toca la cama de impresión
   *
   * Donde h = depth - bevelDepth.
   *
   * Si bevelWidth o bevelDepth son 0, fast path: solo base + pared + cara superior.
   *
   * Orientación de normales (validado en test-plate-orientations.js):
   *   - Base:    tris flipped, normal -Z   (oculta, hacia la cama)
   *   - Pared:   flip=false                 (radial hacia afuera para outer, al centro para hole)
   *   - Bevel:   flip=false                 (normal +Z, visible desde la cámara)
   *   - Cara sup: tris original, normal +Z (visible desde la cámara)
   */
  function processShape(shape) {
    const N = bevelSegments;
    const hasBevel = bevelWidth > 1e-6 && bevelDepth > 1e-6;

    // Helper común: triangular un shape (outer + holes) y emitir tris
    function emitFace(outer, holes, z, flipped, maxEdge = Infinity) {
      const flat = [];
      for (const p of outer) flat.push(p.x, p.y);
      const holeIdx = [];
      let cursor = outer.length;
      for (const hole of holes) {
        holeIdx.push(cursor);
        for (const p of hole) flat.push(p.x, p.y);
        cursor += hole.length;
      }
      const tris = earcut(flat, holeIdx.length ? holeIdx : null, 2);

      // Filtrar triángulos espurios por tamaño máximo de arista.
      // Cuando los rings outer y holes pasan casi tangentes (zonas finas anulares),
      // earcut puede emitir triángulos que cruzan la zona anular en vez de seguirla,
      // produciendo aristas largas que rellenan zonas que no deberían tener material.
      // Si maxEdge < Infinity, descartamos cualquier triángulo cuya arista más larga
      // exceda el umbral.
      let filtered = tris;
      if (maxEdge < Infinity) {
        filtered = [];
        const max2 = maxEdge * maxEdge;
        for (let i = 0; i < tris.length; i += 3) {
          const a = tris[i], b = tris[i + 1], c = tris[i + 2];
          const ax = flat[2*a], ay = flat[2*a+1];
          const bx = flat[2*b], by = flat[2*b+1];
          const cx = flat[2*c], cy = flat[2*c+1];
          const e1 = (bx-ax)*(bx-ax) + (by-ay)*(by-ay);
          const e2 = (cx-bx)*(cx-bx) + (cy-by)*(cy-by);
          const e3 = (ax-cx)*(ax-cx) + (ay-cy)*(ay-cy);
          const longest2 = Math.max(e1, e2, e3);
          if (longest2 <= max2) filtered.push(a, b, c);
        }
      }

      let outTris = filtered;
      if (flipped) {
        outTris = [];
        for (let i = 0; i < filtered.length; i += 3) {
          outTris.push(filtered[i], filtered[i + 2], filtered[i + 1]);
        }
      }
      addTriangles(flat, outTris, z);
    }

    // ── BASE en Z=0 (silueta original con winding invertido, normal -Z) ──
    // Convención de materiales:
    //   modo 'in':  base inferior es Base (face) — es la cara plana del fondo,
    //               coherente con el resto de superficies grandes que son Base.
    //   modo 'out': base inferior es Borde — en este modo solo la cima es Base,
    //               todo el resto (pared, chaflán, base) es Borde.
    const baseMatIdx = (bevelMode === 'in') ? 0 : 1;
    emitFace(shape.outer, shape.holes, 0, true);
    const baseEnd = indices.length;
    groupRanges.push({ start: curStart, count: baseEnd - curStart, materialIndex: baseMatIdx });
    curStart = baseEnd;

    // ── FAST PATH sin bevel: pared completa + cara superior plana ──
    if (!hasBevel) {
      const allRings = [shape.outer, ...shape.holes];
      for (const ring of allRings) {
        stitchRings(ring, 0, ring, depth, false);
      }
      const wallEnd = indices.length;
      // Sin bevel no hay realmente distinción semántica entre "cima" y "borde".
      // Convención: pared = Borde (consistente con modo 'out' que aplica esta regla)
      groupRanges.push({ start: curStart, count: wallEnd - curStart, materialIndex: 1 });
      curStart = wallEnd;

      emitFace(shape.outer, shape.holes, depth, false);
      const topEnd = indices.length;
      groupRanges.push({ start: curStart, count: topEnd - curStart, materialIndex: 0 });
      curStart = topEnd;
      return;
    }

    // Pre-cálculo de niveles del bevel — válido para ambos modos.
    // levels[k] = shape offsetado por bisectriz a delta = -bevelWidth · profile(t_k).off
    const levels = [];
    for (let k = 0; k <= N; k++) {
      const t = k / N;
      const { off } = profileFn(t);
      const delta = -bevelWidth * off;
      if (k === 0 || off === 0) {
        levels.push({
          outer: shape.outer.map(p => ({ x: p.x, y: p.y })),
          holes: shape.holes.map(hh => hh.map(p => ({ x: p.x, y: p.y }))),
        });
      } else {
        levels.push(offsetShapeByBisector(shape, delta));
      }
    }
    const lastLevel = levels.length - 1;

    if (bevelMode === 'in') {
      // ──────────────── BEVEL HUNDIDO + MARCO EXTERIOR (estilo "EL CANGRI") ────────────────
      //
      //   Z=depth              ← cima (silueta CONTRAÍDA, plana, con la fosa como hole interior)
      //      ↘ chaflán EXTERIOR suavizado (visible desde arriba: el "marco" tipo CANGRI)
      //   Z=depth - bevelDepth ← plano coplanar:
      //                            - base del chaflán exterior (silueta original)
      //                            - fondo plano de la fosa hundida (silueta robusta vía clipper)
      //   ↑ pared vertical exterior (silueta original, 0 → wallTop)
      //   ↑ pared vertical de la fosa (silueta de la fosa, wallTop → depth, vertical 90°)
      //   Z=0                  ← base (silueta original)
      //
      // La fosa NO tiene bevel hundido suavizado (cae vertical). Esto evita los
      // problemas topológicos que aparecían con la doble contracción del bisector
      // en letras con vértices afilados (A, N, R en el bowl). La silueta de la fosa
      // se calcula con clipper (offsetShape) que es robusto en cualquier polígono.
      //
      // Si bevelDepth > depth, no cabe → degradar a modo 'out' (fall-through).
      if (bevelDepth > depth - 0.1) {
        // No cabe. Caer al path 'out' más abajo.
      } else {
        const wallTop = depth - bevelDepth;

        // ─── PARED VERTICAL EXTERIOR (Z=0 → wallTop) ───
        const allRings = [shape.outer, ...shape.holes];
        for (const ring of allRings) {
          stitchRings(ring, 0, ring, wallTop, false);
        }
        const wallExtEnd = indices.length;
        groupRanges.push({ start: curStart, count: wallExtEnd - curStart, materialIndex: 0 });
        curStart = wallExtEnd;

        // ─── CHAFLÁN EXTERIOR + INTERIOR SUAVIZADO (Z = wallTop → depth) ───
        // Tanto el outer como los holes hacen chaflán: outer contraído, holes
        // expandidos. Esto mantiene la cima como un anillo topológicamente
        // consistente (outer y holes ambos "encogidos" hacia el material).
        const zsOut = [];
        for (let k = 0; k <= N; k++) {
          const t = k / N;
          const { dep } = profileFn(t);
          zsOut.push(wallTop + bevelDepth * dep);
        }
        for (let k = 0; k < lastLevel; k++) {
          // Outer: silueta original → contraída (silueta del trazo se encoge)
          stitchRings(levels[k].outer, zsOut[k], levels[k + 1].outer, zsOut[k + 1], false);
          // Holes: silueta original → expandida (el hueco se ensancha hacia adentro
          // del material). El bisector ya hace esto automáticamente porque los
          // holes son CW: aplicar delta negativo al ring CW resulta en expansión.
          for (let h = 0; h < levels[k].holes.length; h++) {
            stitchRings(levels[k].holes[h], zsOut[k], levels[k + 1].holes[h], zsOut[k + 1], false);
          }
        }
        const chaflanEnd = indices.length;
        groupRanges.push({ start: curStart, count: chaflanEnd - curStart, materialIndex: 0 });
        curStart = chaflanEnd;

        // ─── FOSA: SILUETA ROBUSTA VÍA CLIPPER ───
        // cimaShape: outer Y holes ambos contraídos/expandidos por el bevel.
        // El outer encoge, los holes ensanchan: la cima es la zona de material
        // que sobrevive al chaflán por ambos lados.
        const cimaShape = {
          outer: levels[lastLevel].outer,
          holes: levels[lastLevel].holes.map(hh => hh.map(p => ({ x: p.x, y: p.y }))),
        };

        // Calcular ancho seguro para la fosa interior usando clipper.
        const cimaSafeInset = findMaxSafeInset(cimaShape, bevelWidth * 2);
        // Margen del 80% para garantizar separación visual entre cima y fosa.
        const fosaWidth = Math.min(bevelWidth, cimaSafeInset * 0.8);

        // offsetShape (clipper) devuelve un array de componentes, cada una con
        // {outer, holes}. Para letras simples será una sola componente; para letras
        // con holes que se separan al contraer, pueden ser varias.
        const fosaComponents = (fosaWidth > 1e-6)
          ? offsetShape(cimaShape, -fosaWidth)
          : [];

        // ─── CIMA en Z=depth ───
        // Outer = silueta contraída. Holes = holes EXPANDIDOS de la letra
        // (de cimaShape, ambos lados pasaron por el chaflán) + los outer de
        // cada componente de la fosa (invertidos a CW).
        const cimaHoles = cimaShape.holes.map(hh => hh.map(p => ({ x: p.x, y: p.y })));
        for (const comp of fosaComponents) {
          // comp.outer es CCW; lo convertimos a CW para usarlo como hole de earcut
          cimaHoles.push(comp.outer.slice().reverse());
        }
        // Filtrar triángulos espurios: la cima legítima es una franja anular fina
        // de ancho ~fosaWidth. Si earcut produce un triángulo cuya arista más larga
        // excede edgeTolMult×bevelWidth, es un triángulo espurio cruzando una zona
        // donde dos rings (outer/hole) pasan tangentes sin que earcut detecte el
        // contorno. El multiplicador es ajustable por el usuario en la UI.
        const cimaMaxEdge = bevelWidth * edgeTolMult;
        emitFace(cimaShape.outer, cimaHoles, depth, false, cimaMaxEdge);
        const cimaEnd = indices.length;
        groupRanges.push({ start: curStart, count: cimaEnd - curStart, materialIndex: 0 });
        curStart = cimaEnd;

        if (fosaComponents.length === 0) {
          // No cabe la fosa. Solo se ha construido el chaflán exterior.
          return;
        }

        // ─── PAREDES VERTICALES DE LA FOSA (Z = wallTop → depth) ───
        // Pared interior de cada componente de la fosa. La normal debe apuntar
        // HACIA EL CENTRO de la fosa (donde está el aire), opuesto a la pared
        // exterior del trazo (que apunta hacia afuera).
        //
        // Stitching estándar (ZA abajo, ZB arriba) con outer CCW y flip=false
        // da normal radial AFUERA del polígono. Como queremos lo contrario,
        // usamos flip=true.
        for (const comp of fosaComponents) {
          stitchRings(comp.outer, wallTop, comp.outer, depth, true);
        }
        const fosaWallEnd = indices.length;
        groupRanges.push({ start: curStart, count: fosaWallEnd - curStart, materialIndex: 0 });
        curStart = fosaWallEnd;

        // ─── FONDO DE LA FOSA en Z = wallTop ───
        // Una cara plana por cada componente. Holes originales de la letra atraviesan
        // también este plano (si la fosa de un trazo curvo coincide con un hole de
        // la letra, eso lo gestiona clipper al calcular fosaComponents).
        for (const comp of fosaComponents) {
          // Como el componente puede tener sus propios holes (si la fosa rodea un
          // hole de la letra), pasamos comp.holes. Si comp ya excluyó los holes
          // originales (porque están dentro de la fosa o no), usamos comp.holes.
          emitFace(comp.outer, comp.holes, wallTop, false);
        }
        const fosaFondoEnd = indices.length;
        groupRanges.push({ start: curStart, count: fosaFondoEnd - curStart, materialIndex: 1 });
        curStart = fosaFondoEnd;
        return;
      }
    }

    // ──────────────── BEVEL HACIA AFUERA (modo 'out', original) ────────────────
    const h = depth - bevelDepth;

    // Pared vertical (0 → h)
    {
      const allRings = [shape.outer, ...shape.holes];
      for (const ring of allRings) {
        stitchRings(ring, 0, ring, h, false);
      }
      const wallEnd = indices.length;
      groupRanges.push({ start: curStart, count: wallEnd - curStart, materialIndex: 1 });
      curStart = wallEnd;
    }

    // Bevel afuera: zs crece de h a depth
    const zs = [];
    for (let k = 0; k <= N; k++) {
      const t = k / N;
      const { dep } = profileFn(t);
      zs.push(h + bevelDepth * dep);
    }

    for (let k = 0; k < lastLevel; k++) {
      const aRings = [levels[k].outer, ...levels[k].holes];
      const bRings = [levels[k + 1].outer, ...levels[k + 1].holes];
      for (let r = 0; r < aRings.length; r++) {
        stitchRings(aRings[r], zs[k], bRings[r], zs[k + 1], false);
      }
    }
    const bevelEnd = indices.length;
    groupRanges.push({ start: curStart, count: bevelEnd - curStart, materialIndex: 1 });
    curStart = bevelEnd;

    // Cara superior contraída en Z=depth
    emitFace(levels[lastLevel].outer, levels[lastLevel].holes, depth, false);
    const topEnd = indices.length;
    groupRanges.push({ start: curStart, count: topEnd - curStart, materialIndex: 0 });
    curStart = topEnd;
  }

  for (const shape of shapes) processShape(shape);

  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geom.setIndex(indices);

  // Compactar grupos consecutivos del mismo material
  const compacted = [];
  for (const g of groupRanges) {
    if (g.count === 0) continue;
    const last = compacted[compacted.length - 1];
    if (last && last.materialIndex === g.materialIndex && last.start + last.count === g.start) {
      last.count += g.count;
    } else {
      compacted.push({ ...g });
    }
  }
  for (const g of compacted) geom.addGroup(g.start, g.count, g.materialIndex);

  geom.computeVertexNormals();
  geom.computeBoundingBox();

  return geom;
}

test('bisector: vértices cóncavos afilados NO causan auto-intersección', () => {
  // Forma con dos picos cóncavos profundos (rincones interiores)
  const concave = [
    {x:0,y:0},{x:10,y:0},{x:10,y:10},{x:6,y:10},
    {x:5.5,y:4},{x:5,y:10},{x:4.5,y:4},{x:4,y:10},{x:0,y:10},
  ];
  const r = offsetRingByBisector(concave, -1, true);
  // Verificar que ningún segmento del polígono cruza con otro no adyacente
  function intersect(a1, a2, b1, b2) {
    function cr(o, a, b) { return (a.x-o.x)*(b.y-o.y) - (a.y-o.y)*(b.x-o.x); }
    const d1 = cr(b1,b2,a1), d2 = cr(b1,b2,a2), d3 = cr(a1,a2,b1), d4 = cr(a1,a2,b2);
    return ((d1>0&&d2<0)||(d1<0&&d2>0)) && ((d3>0&&d4<0)||(d3<0&&d4>0));
  }
  let crossings = 0;
  const n = r.length;
  for (let i = 0; i < n; i++) {
    for (let j = i + 2; j < n; j++) {
      if ((j+1)%n === i) continue;
      if (intersect(r[i], r[(i+1)%n], r[j], r[(j+1)%n])) crossings++;
    }
  }
  assert(crossings === 0, `expected 0 cruces, got ${crossings}`);
});

function assert(cond, msg = 'assertion failed') {
  if (!cond) throw new Error(msg);
}
function assertNear(a, b, tol = 1e-6) {
  if (Math.abs(a - b) > tol) throw new Error(`expected ${b}±${tol}, got ${a}`);
}

function runTests() {
  const out = document.getElementById('test-results');
  let pass = 0, fail = 0;
  const lines = [];
  for (const t of tests) {
    try {
      t.fn();
      lines.push(`<div class="pass">✓ ${t.name}</div>`);
      pass++;
    } catch (e) {
      lines.push(`<div class="fail">✗ ${t.name}: ${e.message}</div>`);
      fail++;
    }
  }
  out.innerHTML = `<div style="margin-bottom:6px"><strong>${pass} pass</strong> · ${fail} fail</div>` + lines.join('');
  console.log(`Tests: ${pass} pass, ${fail} fail`);
  return { pass, fail };
}

const wrap = document.getElementById('canvas-wrap');

// Defensive sizing: si el grid aún no ha calculado, usar window como fallback.
// Algunos entornos (vista previa de IDE, iframes) reportan clientWidth=0
// hasta el siguiente paint. ResizeObserver atrapa cualquier cambio posterior.
function getWrapSize() {
  const w = wrap.clientWidth || (window.innerWidth - 340);
  const h = wrap.clientHeight || window.innerHeight;
  return { w: Math.max(w, 100), h: Math.max(h, 100) };
}

const initSize = getWrapSize();
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(initSize.w, initSize.h);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
wrap.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0c);

const camera = new THREE.PerspectiveCamera(40, initSize.w / initSize.h, 0.1, 5000);
camera.position.set(0, 30, 220);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0xffffff, 0.3));
const key = new THREE.DirectionalLight(0xffffff, 1.4);
key.position.set(80, 120, 100);
scene.add(key);
const fill = new THREE.DirectionalLight(0xfff2cc, 0.5);
fill.position.set(-80, 40, 80);
scene.add(fill);
const rim = new THREE.DirectionalLight(0xffd27f, 0.7);
rim.position.set(0, 60, -120);
scene.add(rim);

function applySize() {
  const { w, h } = getWrapSize();
  renderer.setSize(w, h, false); // false = no actualiza el style del canvas
  // Pero sí queremos que el canvas llene el wrap visualmente:
  renderer.domElement.style.width = w + 'px';
  renderer.domElement.style.height = h + 'px';
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}

window.addEventListener('resize', applySize);

// ResizeObserver dispara cuando el grid CSS se asienta y cuando el panel se
// redimensiona. Más robusto que window resize en entornos con paneles dinámicos.
if (typeof ResizeObserver !== 'undefined') {
  const ro = new ResizeObserver(applySize);
  ro.observe(wrap);
}

// Fallback: forzar resize en el siguiente frame y al cargar todo
requestAnimationFrame(applySize);
window.addEventListener('load', applySize);

const state = {
  text: 'CANGRI',
  font: null,
  depth: 22,
  bevelMode: 'out',  // 'out' = hacia afuera (placa con cima contraída), 'in' = hundido (fosa interior)
  bevelSize: 3.5,
  bevelThick: 3,
  bevelSeg: 6,
  profile: 0,
  edgeTol: 8,    // multiplicador de bevelWidth para el filtro de aristas en la cima del modo 'in'
  colorFace: '#e8d28a',
  colorBevel: '#c9a227',
  metal: 0.85,
  rough: 0.25,
};

let mesh = null;

function buildMaterials() {
  return [
    new THREE.MeshStandardMaterial({
      color: state.colorFace, metalness: state.metal, roughness: state.rough,
    }),
    new THREE.MeshStandardMaterial({
      color: state.colorBevel, metalness: state.metal, roughness: state.rough,
    }),
  ];
}

function setStatus(msg, kind = '') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = kind;
}

function setStats(geom) {
  const v = geom.attributes.position.count;
  const t = geom.index.count / 3;
  const { w, h } = getWrapSize();
  document.getElementById('stats').textContent =
    `${v} vértices · ${t} tris · canvas ${w}×${h}`;
}

function drawProfilePreview() {
  const svg = document.getElementById('profile-svg');
  const fn = makeProfile(state.profile);
  const pts = [];
  // Eje X: depth (0 → 1), eje Y: offset (0 → 1). El perfil se ve "desde el lado".
  // En SVG: x = dep · 100, y = (1 − off) · 50 (invertido para arriba)
  for (let i = 0; i <= 30; i++) {
    const t = i / 30;
    const r = fn(t);
    pts.push(`${r.dep * 100},${(1 - r.off) * 48 + 1}`);
  }
  svg.innerHTML = `
    <line x1="0" y1="49" x2="100" y2="49" stroke="#2a2a35" stroke-width="0.5"/>
    <line x1="0" y1="1" x2="0" y2="49" stroke="#2a2a35" stroke-width="0.5"/>
    <polyline points="${pts.join(' ')}" fill="none" stroke="${getComputedStyle(document.documentElement).getPropertyValue('--accent')}" stroke-width="1.2"/>
  `;
}

function rebuild() {
  if (!state.font) return;

  try {
    const subpaths = sampleFontPath(state.font, state.text || ' ', 72, 14);
    if (!subpaths.length) {
      setStatus('Texto vacío o glifos no soportados', 'warn');
      return;
    }
    const shapes = groupShapes(subpaths);

    // Clamp bevel a inset máximo seguro (mínimo entre todos los shapes)
    let maxSafe = Infinity;
    for (const s of shapes) {
      const m = findMaxSafeInset(s, 30);
      if (m < maxSafe) maxSafe = m;
    }
    const safeBevelW = Math.min(state.bevelSize, maxSafe * 0.9);
    const safeBevelD = Math.min(state.bevelThick, state.depth - 0.1);

    let warn = '';
    if (safeBevelW < state.bevelSize - 1e-3) {
      warn = `Bevel ancho clampado a ${safeBevelW.toFixed(2)} (límite por geometría del glifo)`;
    }

    const profileFn = makeProfile(state.profile);

    const geom = buildBeveledTextGeometry({
      shapes,
      depth: state.depth,
      bevelWidth: safeBevelW,
      bevelDepth: safeBevelD,
      bevelSegments: state.bevelSeg,
      bevelMode: state.bevelMode,
      edgeTolMult: state.edgeTol,
      profileFn,
    });

    // Centrar
    const bb = geom.boundingBox;
    const cx = (bb.max.x + bb.min.x) / 2;
    const cy = (bb.max.y + bb.min.y) / 2;
    const cz = (bb.max.z + bb.min.z) / 2;
    geom.translate(-cx, -cy, -cz);

    if (mesh) {
      scene.remove(mesh);
      mesh.geometry.dispose();
      mesh.material.forEach(m => m.dispose());
    }
    mesh = new THREE.Mesh(geom, buildMaterials());
    scene.add(mesh);

    setStats(geom);
    if (warn) {
      setStatus(warn, 'warn');
    } else if (safeBevelW < 1e-6 || safeBevelD < 1e-6) {
      setStatus('Sin bisel (ancho o profundidad = 0)', 'ok');
    } else {
      setStatus('OK', 'ok');
    }
  } catch (e) {
    console.error(e);
    setStatus(`Error: ${e.message}`, 'err');
  }
}

// ============================================================================
// MÓDULO: FONT LOADING
// Estrategia:
//   1. Fuente embebida (Bebas Neue como base64) → carga inmediata, sin red.
//   2. Google Fonts: priorizar TTF; si solo hay woff2, decodificar con
//      DecompressionStream('brotli') del navegador (nativo, sin dependencias).
//   3. Upload del usuario: TTF/OTF directos, woff2 vía DecompressionStream.
// ============================================================================

// Bebas Neue TTF embebido (cargado al final del script desde EMBEDDED_FONT_B64)
let EMBEDDED_FONT_B64 = ''; // se asigna al final del módulo

function base64ToArrayBuffer(b64) {
  const bin = atob(b64);
  const len = bin.length;
  const bytes = new Uint8Array(len);
  for (let i = 0; i < len; i++) bytes[i] = bin.charCodeAt(i);
  return bytes.buffer;
}

/**
 * Decodifica WOFF2 a TTF/OTF usando DecompressionStream nativo del navegador.
 * WOFF2 = header binario + tablas comprimidas con Brotli. El formato exige
 * descomprimir las tablas, no el archivo entero — pero como solo necesitamos
 * un buffer parseable por opentype.js, hacemos una conversión completa.
 *
 * Implementación: parsear el header WOFF2 manualmente (24 bytes), descomprimir
 * el bloque de tablas con DecompressionStream, y reconstruir un SFNT/TTF válido.
 *
 * Esto es no-trivial (~150 líneas de spec). En vez de eso, devuelvo un error
 * claro y le decimos al usuario que suba TTF/OTF si quiere usar su propia
 * fuente, o que use el selector de Google Fonts (que ya prioriza TTF).
 */
async function decodeWoff2(buf) {
  // Implementación minimal vía woff2-encoder en CDN (que sí es ESM puro y
  // bundleable, a diferencia de wawoff2 que importa node:fs).
  // Si esto también falla, mostramos error claro.
  try {
    const mod = await import('https://cdn.jsdelivr.net/npm/woff2-encoder@2.0.0/+esm');
    const result = await mod.decompress(new Uint8Array(buf));
    return result.buffer.slice(result.byteOffset, result.byteOffset + result.byteLength);
  } catch (e) {
    throw new Error('WOFF2 no soportado en este entorno. Sube un TTF/OTF directamente.');
  }
}

async function loadFontBuffer(buf) {
  const view = new DataView(buf);
  const tag = view.getUint32(0, false);
  // 'wOF2' = 0x774F4632
  if (tag === 0x774F4632) {
    setStatus('Decodificando WOFF2...', '');
    const ttfBuf = await decodeWoff2(buf);
    return opentype.parse(ttfBuf);
  }
  return opentype.parse(buf);
}

async function loadGoogleFont(family) {
  setStatus(`Cargando ${family}...`);
  const cssUrl = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(family)}:wght@400&display=swap`;
  let cssText;
  try {
    cssText = await fetch(cssUrl).then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.text();
    });
  } catch (e) {
    throw new Error(`No se pudo contactar Google Fonts (${e.message}). Quizá el entorno bloquea fetch externo.`);
  }
  const ttfMatch = cssText.match(/url\((https:\/\/fonts\.gstatic\.com\/[^)]+\.ttf)\)/i);
  const woff2Match = cssText.match(/url\((https:\/\/fonts\.gstatic\.com\/[^)]+\.woff2)\)/i);
  const fontUrl = ttfMatch ? ttfMatch[1] : (woff2Match ? woff2Match[1] : null);
  if (!fontUrl) throw new Error(`No se encontró URL de fuente para ${family}`);

  // Parsear a una variable local antes de tocar state.font. Si algo falla en
  // el fetch o en el parse, state.font queda intacto (con la fuente embebida
  // que cargó loadEmbeddedFont al boot, o con la última que cargó el usuario).
  const buf = await fetch(fontUrl).then(r => {
    if (!r.ok) throw new Error(`HTTP ${r.status} al descargar TTF`);
    return r.arrayBuffer();
  });
  if (!buf || buf.byteLength < 100) {
    throw new Error(`Buffer de fuente inválido (${buf ? buf.byteLength : 0} bytes)`);
  }
  const parsed = await loadFontBuffer(buf);
  if (!parsed) throw new Error('opentype.parse devolvió null');

  // Solo ahora asignamos.
  state.font = parsed;
  setStatus(`Cargada: ${family}`, 'ok');
  rebuild();
}

async function loadUploadedFont(file) {
  setStatus(`Parseando ${file.name}...`);
  const buf = await file.arrayBuffer();
  state.font = await loadFontBuffer(buf);
  setStatus(`Cargada: ${file.name}`, 'ok');
  rebuild();
}

/**
 * Carga la fuente embebida como fallback garantizado. Se llama PRIMERO al boot
 * para que siempre haya algo que renderizar, incluso si Google Fonts falla.
 */
function loadEmbeddedFont() {
  try {
    const buf = base64ToArrayBuffer(EMBEDDED_FONT_B64);
    state.font = opentype.parse(buf);
    setStatus('Fuente local cargada (Bebas Neue)', 'ok');
    rebuild();
    return true;
  } catch (e) {
    setStatus(`Error fuente embebida: ${e.message}`, 'err');
    return false;
  }
}

function bindRange(id, key, parser = parseFloat, decimals = 0, extra = null) {
  const el = document.getElementById(id);
  const valEl = document.getElementById(id + '-v');
  el.addEventListener('input', () => {
    state[key] = parser(el.value);
    valEl.textContent = decimals ? state[key].toFixed(decimals) : state[key];
    if (extra) extra();
    rebuild();
  });
}

bindRange('depth', 'depth', parseFloat, 0);
bindRange('bevel-size', 'bevelSize', parseFloat, 1);
bindRange('bevel-thick', 'bevelThick', parseFloat, 1);
bindRange('bevel-seg', 'bevelSeg', parseInt, 0);
bindRange('profile', 'profile', parseFloat, 2, drawProfilePreview);
bindRange('edge-tol', 'edgeTol', parseFloat, 1);
bindRange('metal', 'metal', parseFloat, 2, () => {
  if (mesh) mesh.material.forEach(m => m.metalness = state.metal);
});
bindRange('rough', 'rough', parseFloat, 2, () => {

});

/**
 * Construye un archivo 3MF (ZIP con XMLs) con dos objetos separados, uno por
 * cada materialIndex. Bambu Studio lee estos como objetos distintos y permite
 * asignar filamentos diferentes via el AMS.
 *
 * Estructura del ZIP:
 *   [Content_Types].xml          declaración de tipos MIME
 *   _rels/.rels                  relación raíz → 3D/3dmodel.model
 *   3D/3dmodel.model             el XML con la geometría
 */
function build3MF(mesh, modelName, colorFace, colorBevel) {
  const geom = mesh.geometry;
  const positions = geom.getAttribute('position');
  const indexAttr = geom.getIndex();
  const groups = geom.groups;
  if (!indexAttr || groups.length === 0) {
    throw new Error('Geometría sin grupos o sin índice');
  }

  // Aplicar la transformación del mesh a los vértices (escala + posición)
  // para que las coordenadas en el 3MF estén en el sistema "mundo"
  mesh.updateMatrixWorld(true);
  const matrix = mesh.matrixWorld;
  const tmpVec = new THREE.Vector3();

  // Recolectar TODOS los vértices y triángulos en un único objeto, anotando
  // el material de cada triángulo. Esto permite usar la 3MF Materials
  // Extension con propiedades por triángulo, manteniendo la pieza como UNA
  // sola unidad imprimible (en vez de dos objetos separados que el usuario
  // tendría que mover en bloque).
  const allVerts = [];     // [x, y, z, x, y, z, ...]
  const allTris = [];      // [{ v: [i0, i1, i2], pindex: 0|1 }, ...]
  const vertexCache = new Map();  // origIdx → newIdx

  for (const group of groups) {
    const start = group.start;
    const count = group.count;
    const pindex = group.materialIndex; // 0 = Base, 1 = Borde

    for (let i = 0; i < count; i += 3) {
      const tri = [];
      for (let j = 0; j < 3; j++) {
        const origIdx = indexAttr.getX(start + i + j);
        let newIdx = vertexCache.get(origIdx);
        if (newIdx === undefined) {
          newIdx = allVerts.length / 3;
          tmpVec.fromBufferAttribute(positions, origIdx);
          tmpVec.applyMatrix4(matrix);
          allVerts.push(tmpVec.x, tmpVec.y, tmpVec.z);
          vertexCache.set(origIdx, newIdx);
        }
        tri.push(newIdx);
      }
      // Filtrar triángulos degenerados (la spec los prohíbe)
      if (tri[0] !== tri[1] && tri[1] !== tri[2] && tri[0] !== tri[2]) {
        allTris.push({ v: tri, pindex });
      }
    }
  }

  if (allTris.length < 4) {
    throw new Error('Geometría con menos de 4 triángulos válidos');
  }

  // Validar manifoldness para warning
  const edges = new Map();
  for (const t of allTris) {
    const v = t.v;
    for (let i = 0; i < 3; i++) {
      const a = v[i], b = v[(i + 1) % 3];
      const key = a < b ? `${a}_${b}` : `${b}_${a}`;
      edges.set(key, (edges.get(key) || 0) + 1);
    }
  }
  let openEdges = 0;
  for (const [, c] of edges) if (c !== 2) openEdges++;
  if (openEdges > 0) {
    console.warn(`3MF: ${openEdges} aristas no-manifold (modelo no estanco). El slicer puede repararlo o rechazarlo.`);
  } else {
    console.log('3MF: malla manifold ✓');
  }

  // Construir el XML con la Materials Extension (namespace m).
  // <basematerials> declara los materiales con color.
  // Cada <triangle> referencia el índice de basematerials vía p1 (sólido sobre toda
  // la cara). El <object> declara pid="100" como default.
  // Nota: displaycolor es sRGB hexadecimal de 6 u 8 dígitos (RRGGBB o RRGGBBAA).
  // Quitamos el '#' de los colores del UI.
  const colHex = (c) => c.replace('#', '').toUpperCase();
  const baseMatColors = [colHex(colorFace), colHex(colorBevel)];
  const baseMatNames = ['Base', 'Borde'];

  let modelXml = `<?xml version="1.0" encoding="UTF-8"?>
<model unit="millimeter" xml:lang="en-US"`
    + ` xmlns="http://schemas.microsoft.com/3dmanufacturing/core/2015/02"`
    + ` xmlns:m="http://schemas.microsoft.com/3dmanufacturing/material/2015/02">
 <metadata name="Title">${escapeXml(modelName)}</metadata>
 <metadata name="Application">Beveled Text 3D v2</metadata>
 <resources>
  <basematerials id="100">
`;
  for (let i = 0; i < baseMatColors.length; i++) {
    modelXml += `   <base name="${baseMatNames[i]}" displaycolor="#${baseMatColors[i]}" />\n`;
  }
  modelXml += `  </basematerials>
  <object id="1" type="model" name="${escapeXml(modelName)}" pid="100" pindex="0">
   <mesh>
    <vertices>
`;
  for (let k = 0; k < allVerts.length; k += 3) {
    const x = parseFloat(allVerts[k].toFixed(4));
    const y = parseFloat(allVerts[k + 1].toFixed(4));
    const z = parseFloat(allVerts[k + 2].toFixed(4));
    modelXml += `     <vertex x="${x}" y="${y}" z="${z}" />\n`;
  }
  modelXml += `    </vertices>
    <triangles>
`;
  for (const t of allTris) {
    // p1 = pindex en basematerials. Si coincide con el pindex default del
    // object (0), se podría omitir, pero lo dejamos explícito siempre por
    // claridad y robustez.
    modelXml += `     <triangle v1="${t.v[0]}" v2="${t.v[1]}" v3="${t.v[2]}" p1="${t.pindex}" />\n`;
  }
  modelXml += `    </triangles>
   </mesh>
  </object>
 </resources>
 <build>
  <item objectid="1" />
 </build>
</model>
`;

  const contentTypesXml = `<?xml version="1.0" encoding="UTF-8"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
 <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml" />
 <Default Extension="model" ContentType="application/vnd.ms-package.3dmanufacturing-3dmodel+xml" />
</Types>
`;

  const relsXml = `<?xml version="1.0" encoding="UTF-8"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
 <Relationship Id="rel-1" Target="/3D/3dmodel.model" Type="http://schemas.microsoft.com/3dmanufacturing/2013/01/3dmodel" />
</Relationships>
`;

  const files = {
    '[Content_Types].xml': strToU8(contentTypesXml),
    '_rels/.rels': strToU8(relsXml),
    '3D/3dmodel.model': strToU8(modelXml),
  };

  const zipBytes = zipSync(files, { level: 6 });
  return new Blob([zipBytes], { type: 'model/3mf' });
}

function escapeXml(s) {
  return String(s).replace(/[<>&"']/g, c => ({
    '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;', "'": '&apos;',
  }[c]));
}

    download(new Blob([stlString], { type: 'model/stl' }), `${state.text || 'text'}.stl`);
    setStatus('STL exportado (pinta caras en el slicer para multicolor)', 'ok');

});

/**
 * Genera un único STL ASCII con toda la geometría en coordenadas mundo.
 * Sin separación por material — para multicolor, usar la herramienta de
 * pintado por caras del slicer (BambuStudio: "Color Painting" sobre el
 * objeto importado). Las paredes verticales en 90° del modo 'in' hacen
 * el pintado trivial (basta seleccionar el plano horizontal de la fosa).
 */
function buildSingleSTL(mesh) {
  const geom = mesh.geometry;
  const positions = geom.getAttribute('position');
  const indexAttr = geom.getIndex();
  if (!indexAttr) throw new Error('Geometría sin índice');

  mesh.updateMatrixWorld(true);
  const matrix = mesh.matrixWorld;
  const tmpA = new THREE.Vector3();
  const tmpB = new THREE.Vector3();
  const tmpC = new THREE.Vector3();
  const tmpN = new THREE.Vector3();
  const e1 = new THREE.Vector3();
  const e2 = new THREE.Vector3();

  let s = `solid model\n`;
  const triCount = indexAttr.count / 3;
  for (let i = 0; i < triCount; i++) {
    const a = indexAttr.getX(i * 3);
    const b = indexAttr.getX(i * 3 + 1);
    const c = indexAttr.getX(i * 3 + 2);
    if (a === b || b === c || a === c) continue;
    tmpA.fromBufferAttribute(positions, a).applyMatrix4(matrix);
    tmpB.fromBufferAttribute(positions, b).applyMatrix4(matrix);
    tmpC.fromBufferAttribute(positions, c).applyMatrix4(matrix);
    e1.subVectors(tmpB, tmpA);
    e2.subVectors(tmpC, tmpA);
    tmpN.crossVectors(e1, e2);
    const len = tmpN.length();
    if (len < 1e-12) continue;
    tmpN.divideScalar(len);
    s += `facet normal ${tmpN.x} ${tmpN.y} ${tmpN.z}\n`;
    s += ` outer loop\n`;
    s += `  vertex ${tmpA.x} ${tmpA.y} ${tmpA.z}\n`;
    s += `  vertex ${tmpB.x} ${tmpB.y} ${tmpB.z}\n`;
    s += `  vertex ${tmpC.x} ${tmpC.y} ${tmpC.z}\n`;
    s += ` endloop\n`;
    s += `endfacet\n`;
  }
  s += `endsolid model\n`;
  return s;
}

function download(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}
